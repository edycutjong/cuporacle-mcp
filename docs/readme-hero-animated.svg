    </rect>

    <!-- ================= RIGHT: STORY ================= -->
    <!-- stdio rail -->
    <line x1="600" y1="104" x2="1196" y2="104" stroke="#1a4b5c" stroke-width="2" stroke-dasharray="2 6" opacity="0.8"/>
    <!-- node A: the question -->
    <g>
      <rect x="572" y="86" width="56" height="36" rx="10" fill="#0a1a2e" stroke="#8B5CF6" stroke-width="1.6"/>
      <text x="600" y="110" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" fill="#c4b5fd">ask?</text>
      <text x="600" y="140" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11" fill="#7fa6c9">harness</text>
    </g>
    <!-- node B: tools hex (cycles tool names) -->
    <g>
      <path d="M810 80 L836 94 L836 118 L810 132 L784 118 L784 94 Z" fill="#04202a" stroke="#00E5FF" stroke-width="1.8"/>
      <g font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="10.5" fill="#7FF0FF" text-anchor="middle">
        <text x="810" y="110" opacity="0"><animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.16;0.24;0.28;1" dur="8s" repeatCount="indefinite"/>fixtures</text>
        <text x="810" y="110" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.26;0.3;0.36;0.4;1" dur="8s" repeatCount="indefinite"/>odds</text>
        <text x="810" y="110" opacity="0"><animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.38;0.42;0.94;1" dur="8s" repeatCount="indefinite"/>wc_edge</text>
      </g>
      <text x="810" y="152" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11" fill="#7fa6c9">8 MCP tools</text>
    </g>
    <!-- node C: 402 gate -->
    <g>
      <path d="M1002 80 L1028 94 L1028 118 L1002 132 L976 118 L976 94 Z" fill="#120a24" stroke="#8B5CF6" stroke-width="1.8">
        <animate attributeName="stroke" values="#8B5CF6;#FFD166;#8B5CF6;#8B5CF6" keyTimes="0;0.5;0.58;1" dur="8s" repeatCount="indefinite"/>
      </path>
      <text x="1002" y="111" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12" font-weight="700" fill="#c4b5fd">402</text>
      <text x="1002" y="152" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11" fill="#7fa6c9">x402 · 0.05 USDC</text>
    </g>
    <!-- node D: receipt -->
    <g>
      <path d="M1170 82 L1196 96 L1196 112 L1170 126 L1144 112 L1144 96 Z" fill="#231604" stroke="#FFB300" stroke-width="1.6"/>
      <text x="1170" y="108" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="10" fill="#FFD166">0x·✓</text>
      <text x="1170" y="140" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11" fill="#cfa96a">receipt</text>
      <circle cx="1170" cy="104" r="10" fill="none" stroke="#FFD166" stroke-width="2.5">
        <animate attributeName="r" values="8;8;40;40" keyTimes="0;0.56;0.72;1" dur="8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.56;0.6;0.74;1" dur="8s" repeatCount="indefinite"/>
      </circle>
    </g>
    <!-- packet comet -->
    <g>
      <circle r="15" fill="url(#packet)" filter="url(#trail)"/>
      <circle r="5" fill="#ffffff"><animate attributeName="fill" values="#ffffff;#ffffff;#FFD166;#FFD166" keyTimes="0;0.5;0.58;1" dur="8s" repeatCount="indefinite"/></circle>
      <animateMotion path="M600 104 L1196 104" keyPoints="0;0;1;1" keyTimes="0;0.14;0.76;1" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.13;0.16;0.76;0.82;1" dur="8s" repeatCount="indefinite"/>
    </g>

    <!-- panes -->
    <!-- TRANSCRIPT pane -->
    <g>
      <rect x="592" y="176" width="296" height="104" rx="12" fill="#0a1220" fill-opacity="0.78" stroke="#1e3a52" stroke-width="1.4"/>
      <text x="612" y="204" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="12" letter-spacing="2" fill="#5f7f9e">CLAUDE DESKTOP · ONE INSTALL</text>
      <text x="612" y="232" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="14.5" fill="#dbe7f5">"Tonight's semi-final — worth a bet?"</text>
      <!-- tool chips light in sequence -->
      <g font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12">
        <g opacity="0.2"><animate attributeName="opacity" values="0.2;1;1;0.2" keyTimes="0;0.18;0.94;1" dur="8s" repeatCount="indefinite"/>
          <rect x="612" y="246" width="82" height="22" rx="6" fill="#04202a" stroke="#00E5FF" stroke-width="1.2"/>
          <text x="653" y="262" text-anchor="middle" fill="#7FF0FF">fixtures ▸</text>
        </g>
        <g opacity="0.2"><animate attributeName="opacity" values="0.2;0.2;1;1;0.2" keyTimes="0;0.26;0.32;0.94;1" dur="8s" repeatCount="indefinite"/>
          <rect x="702" y="246" width="62" height="22" rx="6" fill="#04202a" stroke="#00E5FF" stroke-width="1.2"/>
          <text x="733" y="262" text-anchor="middle" fill="#7FF0FF">odds ▸</text>
        </g>
        <g opacity="0.2"><animate attributeName="opacity" values="0.2;0.2;1;1;0.2" keyTimes="0;0.38;0.44;0.94;1" dur="8s" repeatCount="indefinite"/>
          <rect x="772" y="246" width="96" height="22" rx="6" fill="#170f02" stroke="#FFB300" stroke-width="1.2"/>
          <text x="820" y="262" text-anchor="middle" fill="#FFD166">wc_edge $ ▸</text>
        </g>
      </g>
    </g>
    <!-- VERIFY pane -->
    <g>
      <rect x="904" y="176" width="312" height="104" rx="12" fill="#0d0a1c" fill-opacity="0.78" stroke="#8B5CF6" stroke-width="1.5"/>
      <text x="924" y="204" font-family="'Segoe UI',system-ui,-apple-system,sans-serif" font-size="12" letter-spacing="2" fill="#a996d8">RECEIPT_VERIFY · INJECTIVE EVM</text>
      <rect x="924" y="220" width="160" height="22" rx="6" fill="#231604" stroke="#FFB300" stroke-width="1.2"/>
      <text x="934" y="236" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" fill="#FFD166">0x9c2e…77aa ↗</text>
      <text x="924" y="268" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="12.5" fill="#8ba3c9">0.05 USDC · confirmed in 650ms</text>
