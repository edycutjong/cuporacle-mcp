    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="34"/></filter>
    <filter id="trail" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3.2"/></filter>
    <clipPath id="plateClip"><rect x="0" y="0" width="1280" height="320" rx="26"/></clipPath>
    <style>
      @keyframes metricPulse{0%,100%{opacity:.6}50%{opacity:1}}
      @keyframes twinkle{0%,100%{opacity:.25}50%{opacity:.9}}
      @keyframes markBreath{0%,100%{opacity:.3}82%{opacity:.64}}
      @keyframes stripPulse{0%,100%{opacity:.3}50%{opacity:.7}}
      @keyframes glitch{0%,7%,60%,100%{transform:translate(0,0)}61%{transform:translate(-2px,0)}63%{transform:translate(2px,1px)}65%{transform:translate(-1px,-1px)}8%{transform:translate(1.5px,0)}10%{transform:translate(-1.5px,0)}12%{transform:translate(0,0)}}
      .mp{animation:metricPulse 8s ease-in-out infinite}
      .tw{animation:twinkle 8s ease-in-out infinite}
      .mb{animation:markBreath 8s ease-in-out infinite}
      .sp{animation:stripPulse 8s ease-in-out infinite}
      .wm-main{animation:glitch 8s steps(1,end) infinite}
      @media (prefers-reduced-motion: reduce){*{animation:none !important}}
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="320" rx="26" fill="url(#plate)"/>
  <g clip-path="url(#plateClip)">
    <circle cx="300" cy="110" r="150" fill="url(#auroraC)" filter="url(#soft)"><animate attributeName="cx" values="300;360;300" dur="17s" repeatCount="indefinite"/></circle>
    <circle cx="1060" cy="240" r="160" fill="url(#auroraV)" filter="url(#soft)"><animate attributeName="cy" values="240;190;240" dur="15s" repeatCount="indefinite"/></circle>
    <g class="sp" transform="rotate(-35 640 160)" stroke-width="2">
      <line x1="-200" y1="40" x2="1480" y2="40" stroke="#00E5FF" opacity="0.12"/>
      <line x1="-200" y1="240" x2="1480" y2="240" stroke="#00E5FF" opacity="0.09"/>
      <line x1="-200" y1="440" x2="1480" y2="440" stroke="#00E5FF" opacity="0.11"/>
    </g>
    <g fill="#eafcff">
      <circle class="tw" cx="180" cy="46" r="1.6"/><circle class="tw" cx="520" cy="40" r="1.4" style="animation-delay:-2s"/>
      <circle class="tw" cx="760" cy="56" r="1.8" style="animation-delay:-3s"/><circle class="tw" cx="1120" cy="44" r="1.5" style="animation-delay:-1s"/>
      <circle class="tw" cx="960" cy="70" r="1.3" style="animation-delay:-4s"/><circle class="tw" cx="640" cy="30" r="1.3" style="animation-delay:-2.6s"/>
