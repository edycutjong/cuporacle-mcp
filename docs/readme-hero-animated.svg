      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.76;0.82;0.97;1" dur="8s" repeatCount="indefinite"/>
        <rect x="1104" y="216" width="96" height="30" rx="15" fill="url(#edge)"/>
        <text x="1152" y="236" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13.5" font-weight="700" fill="#04121a">✓ VERIFIED</text>
      </g>
    </g>

    <!-- ================= LEFT: BRAND ================= -->
    <g class="mb" filter="url(#soft)">
      <path d="M92 84 L110 96 L103 118 L81 118 L74 96 Z" fill="#00E5FF"/>
    </g>
    <!-- mini mark: braces + pentagon -->
    <g filter="url(#glow)">
      <path d="M66 76 Q54 76 54 88 L54 96 Q54 106 44 106 Q54 106 54 116 L54 124 Q54 136 66 136" fill="none" stroke="url(#edge)" stroke-width="7" stroke-linecap="round"/>
      <path d="M118 76 Q130 76 130 88 L130 96 Q130 106 140 106 Q130 106 130 116 L130 124 Q130 136 118 136" fill="none" stroke="url(#edge)" stroke-width="7" stroke-linecap="round"/>
      <path d="M92 84 L110 96 L103 118 L81 118 L74 96 Z" fill="url(#oracleGrad)" stroke="#04121a" stroke-width="2.5" stroke-linejoin="round"/>
      <circle cx="122" cy="78" r="5" fill="#FFB300"/>
    </g>

    <!-- outlined wordmark: Cup (white) + Oracle (cyan→violet gradient) -->
