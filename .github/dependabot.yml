version: 2
updates:
  # npm dependencies (@modelcontextprotocol/sdk, @injectivelabs/x402, viem, zod, tooling).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk dev/type/tooling bumps into one PR to cut noise.
      dev-dependencies:
        dependency-type: "development"
    labels:
      - "dependencies"

  # Keep the GitHub Actions in ci.yml / codeql.yml current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
